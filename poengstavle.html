<!DOCTYPE html>
<html lang="nn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poengtavle – VM 2026 ⚽</title>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="js/config.js"></script>
<script src="js/teams.js"></script>
<style>
  :root {
    --bg:     #0d1b2e;
    --bg2:    #122036;
    --card:   #1a2d45;
    --green:  #16a34a;
    --gold:   #f59e0b;
    --silver: #94a3b8;
    --bronze: #c2894a;
    --text:   #e2e8f0;
    --muted:  #94a3b8;
    --border: #2a3f5f;
    --sel:    #0ea5e9;
    --red:    #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; }
  a { color: var(--sel); text-decoration: none; }

  header { background: var(--bg2); border-bottom: 1px solid var(--border);
           padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.25rem; font-weight: 700; }
  header nav a { color: var(--muted); margin-left: 1rem; font-size: .9rem; }

  main { max-width: 860px; margin: 0 auto; padding: 1.5rem; }

  /* Status-banner */
  .status-banner {
    background: var(--card); border: 1px solid var(--border); border-radius: .75rem;
    padding: 1rem 1.5rem; margin-bottom: 1.5rem; font-size: .9rem;
  }
  .status-banner h3 { color: var(--gold); font-size: .85rem; text-transform: uppercase;
                      letter-spacing: .05em; margin-bottom: .5rem; }
  .tier-status-grid { display: flex; flex-wrap: wrap; gap: .5rem; }
  .tier-badge {
    padding: .3rem .75rem; border-radius: 9999px; font-size: .82rem; font-weight: 700;
    border: 1px solid var(--border); background: var(--bg2); color: var(--muted);
  }
  .tier-badge.aktiv { background: var(--green); border-color: var(--green); color: #fff; }
  .tier-badge.venter { border-color: var(--gold); color: var(--gold); background: transparent; }

  /* Poengtavle */
  .tavle { background: var(--card); border: 1px solid var(--border); border-radius: .75rem; overflow: hidden; }
  .tavle-header {
    background: var(--bg2); padding: .75rem 1.25rem;
    display: grid; grid-template-columns: 3rem 1fr 5rem 7rem 5rem;
    gap: .5rem; font-size: .78rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .05em;
  }
  .tavle-rad {
    display: grid; grid-template-columns: 3rem 1fr 5rem 7rem 5rem;
    gap: .5rem; padding: .85rem 1.25rem; align-items: center;
    border-top: 1px solid var(--border); transition: background .15s; cursor: pointer;
    /* reset button-stilar */
    width: 100%; background: transparent; color: inherit; font: inherit;
    text-align: left; border-left: none; border-right: none; border-bottom: none;
  }
  .tavle-rad:hover { background: rgba(255,255,255,.03); }
  .tavle-rad:focus-visible {
    outline: 2px solid var(--sel); outline-offset: -2px;
    background: rgba(14,165,233,.07);
  }
  .tavle-rad.topp1 { background: rgba(245,158,11,.08); }
  .tavle-rad.topp2 { background: rgba(148,163,184,.05); }
  .tavle-rad.topp3 { background: rgba(194,137,74,.06); }

  .plass { font-size: 1.1rem; font-weight: 700; text-align: center; }
  .plass-1 { color: var(--gold); }
  .plass-2 { color: var(--silver); }
  .plass-3 { color: var(--bronze); }

  .namn-celle { font-weight: 600; }
  .namn-celle small { display: block; font-size: .78rem; color: var(--muted); font-weight: 400; }

  .poeng-celle { text-align: center; font-size: .9rem; font-weight: 600; }
  .poeng-celle.total { font-size: 1.1rem; color: var(--gold); }
  .poeng-celle.grå   { color: var(--muted); }
  .poeng-celle.vent  { color: var(--muted); font-style: italic; font-size: .78rem; }

  .maks { font-size: .72rem; color: var(--muted); font-weight: 400; }

  /* Detaljar-panel */
  .detaljar-panel {
    grid-column: 1 / -1; padding: 1rem 1.25rem 1.25rem; background: var(--bg2);
    border-top: 1px solid var(--border); display: none;
  }
  .detaljar-panel.synleg { display: block; }
  .tier-seksjon { margin-bottom: .75rem; }
  .tier-seksjon h4 { font-size: .8rem; color: var(--muted); margin-bottom: .4rem; font-weight: 600; }
  .chip {
    display: inline-flex; align-items: center; gap: .25rem;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 9999px; padding: .15rem .55rem; font-size: .78rem; margin: .15rem;
  }
  .chip.riktig-med       { border-color: var(--sel);   background: rgba(14,165,233,.12); }
  .chip.riktig-plassering{ border-color: var(--green); background: rgba(22,163,74,.18); font-weight: 700; }
  .chip.feil             { opacity: .38; }

  /* Laster */
  .laster { text-align: center; padding: 3rem; color: var(--muted); }
  .spinner { font-size: 2rem; animation: snurr 1s linear infinite; display: inline-block; }
  @keyframes snurr { to { transform: rotate(360deg); } }

  /* Meta-rad */
  .meta-rad { display: flex; align-items: center; justify-content: space-between;
              margin-bottom: 1rem; flex-wrap: wrap; gap: .75rem; }
  .meta-rad h2 { font-size: 1.4rem; font-weight: 700; }
  .sist-oppdatert { font-size: .8rem; color: var(--muted); }
  .oppdater-knapp { background: var(--card); border: 1px solid var(--border); color: var(--text);
                    padding: .4rem .8rem; border-radius: .4rem; cursor: pointer; font-size: .85rem; }
  .oppdater-knapp:hover { border-color: var(--sel); }
  .tom-tavle { padding: 3rem; text-align: center; color: var(--muted); }

  /* Poengforklaring */
  .forklaring { font-size: .8rem; color: var(--muted); margin-bottom: 1.5rem;
                background: var(--card); border: 1px solid var(--border); border-radius: .5rem;
                padding: .75rem 1rem; display: flex; flex-wrap: wrap; gap: .75rem; }
  .forklaring span { white-space: nowrap; }
  .dot { width: .65rem; height: .65rem; border-radius: 50%; display: inline-block; margin-right: .3rem; }
  .dot-med  { background: var(--sel); }
  .dot-plas { background: var(--green); }

  @media (max-width: 640px) {
    .tavle-header, .tavle-rad { grid-template-columns: 2.5rem 1fr 4rem 4rem; }
    .col-plassering-header, .col-plassering { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1 id="app-tittel">VM-tipping 2026 ⚽</h1>
  <nav>
    <a href="index.html">Heim</a>
    <a href="tippe.html">Tippe</a>
  </nav>
</header>

<main>
  <div class="meta-rad">
    <h2>🏆 Poengtavle</h2>
    <div style="display:flex;gap:.75rem;align-items:center">
      <span class="sist-oppdatert" id="sist-oppdatert"></span>
      <button class="oppdater-knapp" onclick="lastData()">↻ Oppdater</button>
    </div>
  </div>

  <!-- Tier-status -->
  <div class="status-banner" id="status-banner" style="display:none">
    <h3>Avklarte resultat</h3>
    <div class="tier-status-grid" id="tier-status-grid"></div>
  </div>

  <!-- Forklaring -->
  <div class="forklaring">
    <span><span class="dot dot-med"></span>Blå = riktig lag med i topp 16 (+1p)</span>
    <span><span class="dot dot-plas"></span>Grøn = riktig tier/plassering (+1p)</span>
    <span>Maks: 16 + 16 = <strong>32 poeng</strong></span>
  </div>

  <!-- Poengtavle -->
  <div id="tavle-container">
    <div class="laster"><span class="spinner">⚽</span><br>Lastar…</div>
  </div>

</main>

<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── HTML-escaping (hindrar XSS) ───────────────────────────────
function escHtml(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("app-tittel").textContent = APP.tittel;
  lastData();
});

async function lastData() {
  document.getElementById("tavle-container").innerHTML =
    '<div class="laster"><span class="spinner">⚽</span><br>Lastar…</div>';

  try {
    const [tipperSnap, resultatSnap] = await Promise.all([
      db.collection("tippers").get(),
      db.collection("resultater").doc("aktive").get(),
    ]);

    const resultat = resultatSnap.exists ? resultatSnap.data() : {};
    const tippers  = tipperSnap.docs.map(d => d.data());

    visStatusBanner(resultat);
    visPoengtavle(tippers, resultat);

    document.getElementById("sist-oppdatert").textContent =
      "Sist oppdatert: " + new Date().toLocaleTimeString("nn-NO");
  } catch (e) {
    console.error(e);
    document.getElementById("tavle-container").innerHTML =
      '<div class="laster">Klarte ikkje lasta data. Sjekk Firebase-konfigurasjonen.</div>';
  }
}

function visStatusBanner(resultat) {
  const rt = resultat.toppliste;
  const banner = document.getElementById("status-banner");
  const grid   = document.getElementById("tier-status-grid");
  if (!rt) { banner.style.display = "none"; return; }

  banner.style.display = "";
  const tiers = [
    { key: "p1",    label: "🥇 1. plass",    har: !!rt.p1 },
    { key: "p2",    label: "🥈 2. plass",    har: !!rt.p2 },
    { key: "p3",    label: "🥉 3. plass",    har: !!rt.p3 },
    { key: "p4",    label: "4. plass",        har: !!rt.p4 },
    { key: "p5_8",  label: "5.–8. plass",    har: !!(rt.p5_8  && rt.p5_8.length  === 4) },
    { key: "p9_16", label: "9.–16. plass",   har: !!(rt.p9_16 && rt.p9_16.length === 8) },
  ];
  grid.innerHTML = tiers.map(t => {
    const cls = t.har ? "tier-badge aktiv" : "tier-badge venter";
    const ikon = t.har ? "✅" : "⏳";
    return `<span class="${cls}">${ikon} ${t.label}</span>`;
  }).join("");
}

function visPoengtavle(tippers, resultat) {
  const container = document.getElementById("tavle-container");
  if (!tippers.length) {
    container.innerHTML = '<div class="tavle"><div class="tom-tavle">Ingen har tippa enno.</div></div>';
    return;
  }

  const rt = resultat.toppliste || null;
  const harResultat = !!(rt && (rt.p1 || (rt.p5_8 && rt.p5_8.length) || (rt.p9_16 && rt.p9_16.length)));

  const rangerte = tippers.map(t => {
    const { poeng, detaljar } = beregnPoeng(t, resultat);
    return { ...t, poeng, detaljar };
  }).sort((a, b) => b.poeng - a.poeng || a.namn.localeCompare(b.namn));

  let html = `
    <div class="tavle">
      <div class="tavle-header">
        <div>#</div>
        <div>Namn</div>
        <div style="text-align:center">Med<br><span class="maks">/16</span></div>
        <div class="col-plassering-header" style="text-align:center">Plassering<br><span class="maks">/16</span></div>
        <div style="text-align:center">Sum<br><span class="maks">/32</span></div>
      </div>`;

  rangerte.forEach((t, i) => {
    const plass    = i + 1;
    const plassKls = plass === 1 ? "plass-1" : plass === 2 ? "plass-2" : plass === 3 ? "plass-3" : "";
    const radKls   = plass === 1 ? "topp1"   : plass === 2 ? "topp2"   : plass === 3 ? "topp3"   : "";
    const ikon     = plass === 1 ? "🥇" : plass === 2 ? "🥈" : plass === 3 ? "🥉" : plass;

    const celleEl = (verdi) => harResultat
      ? `<div class="poeng-celle">${verdi}</div>`
      : `<div class="poeng-celle vent">–</div>`;

    html += `
      <button class="tavle-rad ${radKls}" id="rad-${i}"
              aria-expanded="false" aria-controls="detaljar-${i}"
              aria-label="Sjå detaljar for ${escHtml(t.namn)}">
        <div class="plass ${plassKls}" aria-hidden="true">${ikon}</div>
        <div class="namn-celle">${escHtml(t.namn)}</div>
        ${celleEl(t.detaljar.med)}
        <div class="col-plassering">${harResultat
          ? `<div class="poeng-celle">${t.detaljar.plassering}</div>`
          : `<div class="poeng-celle vent">–</div>`}</div>
        <div class="poeng-celle total">${harResultat ? t.poeng : "–"}</div>
      </button>
      <div class="detaljar-panel" id="detaljar-${i}" role="region"
           aria-label="Detaljar for ${escHtml(t.namn)}">
        ${byggDetaljarHTML(t, resultat)}
      </div>`;
  });

  html += "</div>";
  container.innerHTML = html;

  rangerte.forEach((_, i) => {
    const rad = document.getElementById("rad-" + i);
    const panel = document.getElementById("detaljar-" + i);
    rad.addEventListener("click", () => {
      const open = panel.classList.toggle("synleg");
      rad.setAttribute("aria-expanded", open ? "true" : "false");
    });
  });
}

function byggDetaljarHTML(tips, resultat) {
  const tt = tips.toppliste;
  const rt = resultat.toppliste;
  if (!tt) return "<p style='color:var(--muted);font-size:.85rem'>Ingen detaljar tilgjengeleg enno.</p>";

  const tiers = [
    { key: "p1",    label: "🥇 1. plass",  ids: tt.p1    ? [tt.p1]    : [], resIds: rt && rt.p1    ? [rt.p1]    : [] },
    { key: "p2",    label: "🥈 2. plass",  ids: tt.p2    ? [tt.p2]    : [], resIds: rt && rt.p2    ? [rt.p2]    : [] },
    { key: "p3",    label: "🥉 3. plass",  ids: tt.p3    ? [tt.p3]    : [], resIds: rt && rt.p3    ? [rt.p3]    : [] },
    { key: "p4",    label: "4. plass",      ids: tt.p4    ? [tt.p4]    : [], resIds: rt && rt.p4    ? [rt.p4]    : [] },
    { key: "p5_8",  label: "5.–8. plass",  ids: tt.p5_8  || [],             resIds: rt && rt.p5_8  || []            },
    { key: "p9_16", label: "9.–16. plass", ids: tt.p9_16 || [],             resIds: rt && rt.p9_16 || []            },
  ];

  const alleRes16 = rt ? [rt.p1, rt.p2, rt.p3, rt.p4,
    ...(rt.p5_8 || []), ...(rt.p9_16 || [])].filter(Boolean) : [];

  let html = "";
  for (const tier of tiers) {
    if (!tier.ids.length) continue;
    html += `<div class="tier-seksjon"><h4>${tier.label}</h4>`;
    for (const id of tier.ids) {
      const l = lagFraId(id);
      let cls = "chip";
      if (alleRes16.length) {
        const erMed       = alleRes16.includes(id);
        const erPlassert  = tier.resIds.includes(id);
        if (erPlassert)   cls = "chip riktig-plassering";
        else if (erMed)   cls = "chip riktig-med";
        else              cls = "chip feil";
      }
      html += `<span class="${cls}">${l.flag} ${l.namn}</span>`;
    }
    html += "</div>";
  }
  return html || "<p style='color:var(--muted);font-size:.85rem'>Ingen detaljar.</p>";
}
</script>
</body>
</html>
